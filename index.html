<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HEAVEN'S PILLAR Demo</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── Wrapper: centers the canvas vertically in the embed ── */
    .game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

/* ── Canvas: Both WIDTH and HEIGHT must be 100% so the canvas 
         exactly matches the viewport. Raylib's FLAG_WINDOW_RESIZABLE 
         will then detect the true window size and calculate 
         the proper pillarboxing internally. ── */
    canvas#canvas {
      display: block;
      width: 100%;
      height: 100%;  /* <--- ADD THIS LINE */
      border: none;
      outline: none;
      background: #000;
      cursor: default;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
    }

    /* ── Minimal loading overlay ── */
    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 10;
      transition: opacity 0.4s ease;
    }
    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loader .bar-track {
      width: min(60%, 240px);
      height: 4px;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
    }
    #loader .bar-fill {
      height: 100%;
      width: 0%;
      background: #fff;
      transition: width 0.2s ease;
    }

    /* ── Fullscreen ── */
    :fullscreen .game-container {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- Loading overlay -->
  <div id="loader">
    <div class="bar-track"><div class="bar-fill" id="load-bar"></div></div>
  </div>

  <!-- Wrapper div gives us a flexbox centering context -->
  <div class="game-container">
    <canvas class="emscripten" id="canvas"
            width="960" height="720"
            oncontextmenu="event.preventDefault()"
            tabindex="-1"></canvas>
  </div>

  <script>
    /* ── Audio-context auto-resume on first interaction ── */
    var _audioContexts = [];
    (function () {
      self.AudioContext = new Proxy(self.AudioContext, {
        construct(target, args) {
          var ctx = new target(...args);
          _audioContexts.push(ctx);
          return ctx;
        }
      });
    })();

    ['click', 'touchstart', 'keydown'].forEach(function (evt) {
      document.addEventListener(evt, function handler() {
        _audioContexts.forEach(function (ctx) {
          if (ctx.state === 'suspended') ctx.resume();
        });
        document.removeEventListener(evt, handler);
      }, { once: true });
    });

    /* ── Emscripten Module ── */
    var loaderEl = document.getElementById('loader');
    var barFill  = document.getElementById('load-bar');

    var Module = {
      preRun: [],
      postRun: [function () {
        loaderEl.classList.add('hidden');
        document.getElementById('canvas').focus();
      }],

      canvas: (function () {
        var c = document.getElementById('canvas');
        c.addEventListener('webglcontextlost', function (e) {
          e.preventDefault();
          console.warn('WebGL context lost');
        }, false);
        return c;
      })(),

      print:    function (t) { console.log(t); },
      printErr: function (t) { console.error(t); },

      setStatus: function (text) {
        if (!text) {
          loaderEl.classList.add('hidden');
          return;
        }
        var m = text.match(/\((\d+(\.\d+)?)\/(\d+)\)/);
        if (m) {
          var pct = (parseFloat(m[1]) / parseFloat(m[3])) * 100;
          barFill.style.width = pct + '%';
        }
      },

      totalDependencies: 0,
      monitorRunDependencies: function (left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        var pct = left
          ? ((this.totalDependencies - left) / this.totalDependencies) * 100
          : 100;
        barFill.style.width = pct + '%';
        if (!left) Module.setStatus('');
      }
    };

    Module.setStatus('Downloading...');

    window.onerror = function () {
      Module.setStatus('');
      console.error('Unhandled exception — see console');
    };
  </script>

  <script async type="text/javascript" src="index.js"></script>
</body>
</html>
